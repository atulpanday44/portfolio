<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="apGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a1a1a1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>

  <!-- Glassmorphism box border -->
  <rect x="25" y="25" width="150" height="150" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2" filter="url(#glow)"/>

  <!-- AP text with gradient -->
  <text x="100" y="120" font-size="90" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="url(#apGradient)" letter-spacing="8">AP</text>
</svg>